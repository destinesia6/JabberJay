name: CI/CD Release Automation

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'

jobs: 
  build-and-release:
    runs-on: windows-latest

    outputs:
          release_upload_url: ${{ steps.create_release.outputs.upload_url }}

    permissions:
      contents: write
  
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with: 
        fetch-depth: 0

    - name: Get commit message
      id: get_commit_message
      run: |
        commit_message=$(git log --no-merges -1 --format=%B)
    
        echo "commit_message<<EOF" >> $GITHUB_OUTPUT
        echo "$commit_message" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Inject Secret API Key into Config.cs
      shell: pwsh
      env:
        SECRET_KEY: ${{ secrets.JABBERJAY_API_KEY }}
      run: |
        $templatePath = "JabberJay/Config.template.cs" 
        $configPath = "JabberJay/Config.cs"
        
        (Get-Content $templatePath) -replace 'YOUR_API_KEY_HERE', $env:SECRET_KEY -replace 'ConfigTemplate', 'Config' | Set-Content $configPath

    - name: Restore dependencies
      run: |
        dotnet restore JabberJay/SoundboardMAUI.csproj /p:TargetFrameworks=net9.0-windows /p:NoWarn=NU1605
        dotnet restore Installer/Installer.csproj /p:NoWarn=NU1605
        dotnet restore Uninstaller/Uninstaller.csproj /p:NoWarn=NU1605
    - name: Get App Version
      id: get_version
      run: |
        $app_display_version = dotnet build JabberJay/SoundboardMAUI.csproj --configuration Release --getProperty:ApplicationDisplayVersion
        if ([string]::IsNullOrEmpty($app_display_version)) {
          Write-Error "Error: Failed to retrive ApplicationDisplayVersion"
          exit 1
        } else
        {
          Write-Host "Version: $app_display_version"
        }
        echo "APP_INFORMATIONAL_VERSION=$app_display_version" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Create Release Staging Directory
      run: New-Item -ItemType Directory -Force -Path "./temp_release_staging"
      shell: pwsh

    - name: Publish Windows App
      run: >
        dotnet publish JabberJay/SoundboardMAUI.csproj -c Release --self-contained true --runtime win-x64 /p:TargetFrameworks=net9.0-windows10.0.19041.0 --framework net9.0-windows10.0.19041.0 /p:TargetPlatformVersion=10.0.26100.0 /p:SupportedOSPlatformVersion=10.0.26100.0 /p:NoWarn=NU1605

    - name: Copy Files to Staging
      shell: pwsh
      run: |
        Write-Host "--- Debug: Listing all directories to find the build output ---"
        Get-ChildItem -Path . -Recurse -Directory -Filter "publish" | Select-Object FullName

        # Attempt to find the publish directory again with a broader search
        $publishDir = Get-ChildItem -Path "$pwd" -Recurse -Directory | Where-Object { $_.FullName -like "*bin*Release*publish*" -and $_.FullName -like "*win-x64*" } | Select-Object -First 1 -ExpandProperty FullName

        if ($null -eq $publishDir) {
            Write-Error "Still could not find the publish directory. Look at the directory list above and find the correct path."
            exit 1
        }

        Write-Host "Success! Found publish directory at: $publishDir"
        
        if (!(Test-Path "./temp_release_staging")) { New-Item -ItemType Directory -Path "./temp_release_staging" }
        
        # Copy the contents
        $destDir = "./temp_release_staging/JabberJay"
        if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force }
        
        # 2. Copy the contents of the publish folder into the new destination folder
        # By targeting the directory object ($publishDir), we avoid the 'leaf item' error
        Copy-Item -Path "$publishDir\*" -Destination $destDir -Recurse -Force

    - name: Publish Installer (.NET 9)
      shell: pwsh
      run: |
        # 1. Force a restore to make sure all dependencies are mapped
        dotnet restore Installer/Installer.csproj --runtime win-x64

        # 2. Publish with explicit output
        dotnet publish Installer/Installer.csproj `
          -c Release `
          -o ./Installer_Output `
          --self-contained true `
          --runtime win-x64 `
          -p:Platform=x64 `
          /p:NoWarn=NU1605

        # 3. Copy from the specific output folder

        $destDir = "./temp_release_staging/Installer"
        if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force }
        
        # 2. Copy the contents of the publish folder into the new destination folder
        # By targeting the directory object ($publishDir), we avoid the 'leaf item' error
        Copy-Item -Path "./Installer_Output/*" -Destination $destDir -Recurse -Force

    - name: Publish Uninst (.NET 9)
      run: |
        dotnet publish Uninstaller/Uninstaller.csproj -c Release -o ./Uninstaller_Output --self-contained true --runtime win-x64 -p:Platform=x64 /p:NoWarn=NU1605

        $destDir = "./temp_release_staging/Uninstaller"
        if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force }
        
        # 2. Copy the contents of the publish folder into the new destination folder
        # By targeting the directory object ($publishDir), we avoid the 'leaf item' error
        Copy-Item -Path "./Uninstaller_Output" -Destination $destDir -Recurse -Force
      shell: pwsh

    - name: Create 7z Archive from Staging Directory
      run: |
        cd temp_release_staging
        7z a -t7z ../JabberJay.7z *
        cd ..
      shell: pwsh

    - name: Install NetSparkle Tools
      run: |
        dotnet tool install -g NetSparkle.Tools --version 1.2.0
        dotnet tool install -g NetSparkleUpdater.Tools.AppCastGenerator --version 2.8.4
      shell: pwsh

    - name: Prepare NetSparkle Private Key for Signing
      run: |
        $privateKeyContent = "${{ secrets.NETSPARKLE_PRIVATE_KEY }}"
        $privateKeyPath = Join-Path $env:TEMP "NetSparkle_Ed25519.priv"
        Set-Content -Path $privateKeyPath -Value $privateKeyContent -Encoding Ascii
        $publicKeyContent = "${{ vars.NETSPARKLE_PUBLIC_KEY }}"
        $publicKeyPath = Join-Path $env:TEMP "NetSparkle_Ed25519.pub"
        Set-Content -Path $publicKeyPath -Value $publicKeyContent -Encoding Ascii
      shell: pwsh

    - name: Generate Appcast XML
      run: |
        $repo_full_name = "${{ github.repository }}"
        netsparkle-generate-appcast generate --single-file "JabberJay.7z" --file-version "${{ env.APP_INFORMATIONAL_VERSION }}" --key-path "$env:TEMP" --base-url "https://github.com/$repo_full_name/releases/download/${{ env.APP_INFORMATIONAL_VERSION }}/" --appcast-output-directory "." --output-file-name "appcast"
      shell: pwsh
      env:
        NETSPARKLE_KEY_PATH: ''

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.APP_INFORMATIONAL_VERSION }}
        release_name: v${{ env.APP_INFORMATIONAL_VERSION }}
        body: ${{ steps.get_commit_message.outputs.commit_message }}
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}

    - name: Upload JabberJay to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./JabberJay.7z
        asset_name: JabberJay.7z
        asset_content_type: application/x-7z-compressed

    - name: Move Appcast files to docs folder
      run: |
        Move-Item -Path "appcast.xml" -Destination "docs/appcast.xml" -Force
        Move-Item -Path "appcast.xml.signature" -Destination "docs/appcast.xml.signature" -Force
      shell: pwsh

    - name: Commit and Push Appcast to docs folder
      uses: EndBug/add-and-commit@v9
      with:
        add: 'docs/appcast.xml docs/appcast.xml.signature'
        message: 'docs: Update appcast for ${{ github.ref_name }}'
        committer_name: GitHub Actions
        committer_email: actions@github.com
        default_author: github_actions

        
  build-android-release:
    runs-on: ubuntu-latest
    needs: build-and-release
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get App Version
        run: |
          APP_INFORMATIONAL_VERSION=$(dotnet build JabberJay/SoundboardMAUI.csproj --configuration Release --getProperty:ApplicationDisplayVersion)
          echo "APP_INFORMATIONAL_VERSION=$APP_INFORMATIONAL_VERSION" >> $GITHUB_ENV
          echo "VERSION: $APP_INFORMATIONAL_VERSION"
        shell: bash

      - name: Inject Secret API Key into Config.cs (Ubuntu)
        shell: bash
        env:
          SECRET_KEY: ${{ secrets.JABBERJAY_API_KEY }}
        run: |
          TEMPLATE_PATH="JabberJay/Config.template.cs"
          CONFIG_PATH="JabberJay/Config.cs"
  
          # Use sed to replace the class name and the API key
          # -e 's/old/new/g' performs a global replacement
          sed -e "s/ConfigTemplate/Config/g" \
              -e "s/YOUR_API_KEY_HERE/$SECRET_KEY/g" \
              "$TEMPLATE_PATH" > "$CONFIG_PATH"
  
          echo "Config.cs generated successfully."

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Install required workloads
        run: dotnet workload restore

      - name: Restore dependencies
        run: dotnet restore JabberJay.sln /p:TargetFrameworks=net9.0-android /p:NoWarn=NU1605 /p:EnableWindowsTargeting=true
        
      - name: Publish for Android
        run: dotnet publish JabberJay/SoundboardMAUI.csproj -c Release -o ./android_release -f:net9.0-android /p:NoWarn=NU1605 /p:EnableWindowsTargeting=true /p:AndroidEnableAot=false /p:AndroidLinkMode=None
  
      - name: Get APK path
        id: get_apk_path
        run: |
          apk_path=$(find ./android_release -name "*.apk" | head -n 1)
          if [ -z "$apk_path" ]; then
            echo "Error: No APK file found in the output directory."
            exit 1
          fi
          echo "APK_PATH=$apk_path" >> $GITHUB_ENV
        shell: bash

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.build-and-release.outputs.release_upload_url }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: JabberJay-Android.apk
          asset_content_type: application/vnd.android.package-archive
